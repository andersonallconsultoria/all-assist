<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neurax CRM | Validar email</title>
    <meta name="theme-color" content="#00b894">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/login.css">
  </head>
  <body>
    <main class="login-shell">
      <section class="hero">
        <div class="brand-line">
          <span class="brand-mark">n</span>
          <div>
            <strong>Neurax CRM</strong>
            <small>Email seguro</small>
          </div>
        </div>
        <p class="eyebrow">Validacao de email</p>
        <h1>Estamos confirmando que este email pertence a voce.</h1>
        <p>Essa etapa protege o acesso aos dados comerciais do cliente SaaS.</p>
      </section>
      <section class="login-card">
        <span class="login-badge">Validacao</span>
        <h2>Confirmar email</h2>
        <p id="verifyEmailMessage">Clique no botao para validar seu email.</p>
        <button id="verifyEmailButton" type="button">Validar email</button>
      </section>
    </main>
    <script src="/verify-email.js"></script>
  </body>
</html>
